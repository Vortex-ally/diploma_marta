{% extends 'base.html' %}

{% block title %}Оплату скасовано — VeloUkraine{% endblock %}

{% block content %}
<section class="container" style="padding: 2rem 2rem 5rem;">
  <div style="max-width: 900px; margin: 0 auto;">
    <h1 style="font-family:var(--font-head);font-weight:900;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.75rem;">Оплату скасовано</h1>
    <p style="color:var(--text2);margin-bottom:1.5rem;">Ви можете повернутись до оформлення та спробувати ще раз.</p>

    {% if order %}
      <div style="border-top:1px solid var(--border);padding-top:1rem;">
        <div style="color:var(--text3);font-weight:800;letter-spacing:0.12em;text-transform:uppercase;font-size:0.7rem;margin-bottom:6px;">Замовлення</div>
        <div style="font-family:var(--font-head);font-weight:900;font-size:1.2rem;">#{{ order.id }}</div>
      </div>
    {% endif %}

    <div style="margin-top:1.25rem; display:flex; gap:10px; flex-wrap:wrap;">
      <a class="btn btn-primary" href="{% url 'checkout' %}">Повернутись до оформлення</a>
      <a class="btn btn-ghost" href="{% url 'cart' %}">Кошик</a>
    </div>
  </div>
</section>
{% endblock %}
