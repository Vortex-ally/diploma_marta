services:
  - type: web
    name: velosite
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn velosite.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: velosite-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: velosite-db
    databaseName: velosite
    user: velosite
    plan: free
